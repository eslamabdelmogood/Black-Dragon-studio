<svg width="720" height="660" viewBox="0 0 720 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Nomad Sentinel architecture</title>
<desc id="desc">Black Dragon's sensing and reflex layer feeds Nomad Runtime's orchestration layer, which routes between local Guardian-mode reasoning and a Qwen Cloud plugin hosted on Alibaba Cloud, driving actuator selection and a dashboard backed by Alibaba Cloud OSS telemetry.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="720" height="660" fill="#ffffff"/>

<style>
  .box   { fill: #ffffff; stroke-width: 1.4; rx: 12; }
  .teal  { stroke: #0f766e; }
  .tealf { fill: #f0fdfa; stroke: #0f766e; }
  .purple  { stroke: #6d28d9; }
  .purplef { fill: #f5f3ff; stroke: #6d28d9; }
  .gray  { fill: #f8fafc; stroke: #475569; }
  .coral { fill: #fff1f2; stroke: #be123c; }
  .amber { fill: #fffbeb; stroke: #b45309; }
  .th { font: 700 13px sans-serif; fill: #0f172a; }
  .ts { font: 12px sans-serif; fill: #334155; }
  .arr { stroke: #475569; stroke-width: 1.6; fill: none; }
</style>

<rect x="40" y="20" width="640" height="100" rx="14" class="box tealf"/>
<text x="60" y="44" class="th">Edge perception -- Black Dragon Runtime (unchanged)</text>
<rect x="60" y="56" width="280" height="46" rx="8" class="box tealf"/>
<text x="200" y="84" text-anchor="middle" class="ts">Optical skin (FBG sensor mesh)</text>
<rect x="380" y="56" width="280" height="46" rx="8" class="box tealf"/>
<text x="520" y="76" text-anchor="middle" class="ts">Spiking reflex kernel</text>
<text x="520" y="92" text-anchor="middle" class="ts">local, us-latency, NPU-compiled</text>

<line x1="360" y1="120" x2="360" y2="152" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="156" width="640" height="150" rx="14" class="box purplef"/>
<text x="60" y="180" class="th">Orchestration -- Nomad Runtime (unchanged)</text>
<rect x="60" y="192" width="190" height="52" rx="8" class="box purplef"/>
<text x="155" y="214" text-anchor="middle" class="th">CapabilityDetector</text>
<text x="155" y="232" text-anchor="middle" class="ts">device + link conditions</text>
<rect x="265" y="192" width="190" height="52" rx="8" class="box purplef"/>
<text x="360" y="214" text-anchor="middle" class="th">ModeSwitcher</text>
<text x="360" y="232" text-anchor="middle" class="ts">Guardian / Nomad / Workhorse / Stallion</text>
<rect x="470" y="192" width="190" height="52" rx="8" class="box purplef"/>
<text x="565" y="214" text-anchor="middle" class="th">PluginRegistry</text>
<text x="565" y="232" text-anchor="middle" class="ts">auto-discovers plugins/*.py</text>
<rect x="60" y="256" width="600" height="34" rx="8" class="box purplef"/>
<text x="360" y="277" text-anchor="middle" class="ts">AdaptiveLearner -- tunes thresholds from device + risk history</text>

<line x1="220" y1="306" x2="220" y2="340" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="306" x2="500" y2="340" class="arr" marker-end="url(#arrow)"/>
<text x="70" y="330" class="ts">offline / degraded link</text>
<text x="420" y="330" class="ts">online, fast link</text>

<rect x="60" y="344" width="320" height="88" rx="12" class="box gray"/>
<text x="220" y="368" text-anchor="middle" class="th">Guardian / local (bhs, unchanged)</text>
<text x="220" y="388" text-anchor="middle" class="ts">Bat forecaster -&gt; Hermit Crab veto -&gt; Squid weights</text>
<text x="220" y="404" text-anchor="middle" class="ts">deterministic, zero network, decides off risk_mean only</text>
<text x="220" y="420" text-anchor="middle" class="ts" font-style="italic">(structurally blind to diluted hotspots)</text>

<rect x="400" y="344" width="280" height="88" rx="12" class="box coral"/>
<text x="540" y="368" text-anchor="middle" class="th">Stallion -&gt; QwenCloudPlugin (NEW)</text>
<text x="540" y="388" text-anchor="middle" class="ts">same telemetry + risk_field_max,</text>
<text x="540" y="404" text-anchor="middle" class="ts">sent to Qwen Cloud via Alibaba Cloud</text>
<text x="540" y="420" text-anchor="middle" class="ts">structured JSON: action + plain-language reasoning</text>

<line x1="540" y1="432" x2="540" y2="464" class="arr" marker-end="url(#arrow)"/>
<text x="550" y="454" class="ts">runs on Alibaba Cloud (ECS / Model Studio)</text>

<line x1="220" y1="432" x2="360" y2="500" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="470" x2="400" y2="500" class="arr" marker-end="url(#arrow)"/>

<rect x="220" y="504" width="280" height="60" rx="12" class="box amber"/>
<text x="360" y="528" text-anchor="middle" class="th">Actuator selection</text>
<text x="360" y="548" text-anchor="middle" class="ts">reduce speed / isolate zone / redistribute / do nothing</text>

<line x1="360" y1="564" x2="360" y2="596" class="arr" marker-end="url(#arrow)"/>
<rect x="240" y="600" width="240" height="40" rx="8" class="box amber"/>
<text x="360" y="622" text-anchor="middle" class="ts">Dashboard (ECS) + Alibaba Cloud OSS telemetry</text>
</svg>
